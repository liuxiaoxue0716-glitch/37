<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>三十七道品</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: #fdfaf2; /* 温润的浅宣纸黄 */
            color: #2c3631; /* 沉稳深墨灰 */
            padding: 16px 12px 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            padding: 20px 16px 30px;
            transition: all 0.2s;
        }
        
        /* 顶部标题栏样式 */
        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding-left: 6px;
        }
        .brand i { color: #7fb397; opacity: 0.8; }
        .brand h1 {
            font-weight: 300;
            font-size: 22px;
            letter-spacing: 4px;
            color: #2c3631;
            border-left: 1px solid #eaefec;
            padding-left: 14px;
        }
        .brand small { font-weight: 300; font-size: 14px; color: #94a39a; margin-left: auto; letter-spacing: 1px; }
        
        /* 老师金句样式 (移至底部) */
        .teacher-verse {
            background: #eef3ef;
            border-radius: 40px;
            padding: 12px 18px;
            margin: 24px 0 0 0;
            font-size: 14px;
            font-weight: 400;
            color: #2c3631;
            border-left: 4px solid #f0c2c9; /* 温柔茱萸粉 */
            line-height: 1.6;
            min-height: 48px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .teacher-verse i { color: #7fb397; font-size: 18px; opacity: 0.7; }
        
        /* 顶部导航 Tabs */
        .tabs {
            display: flex;
            justify-content: space-around;
            background: #eef3ef;
            border-radius: 60px;
            padding: 6px 4px;
            margin-bottom: 22px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 500;
            color: #55635a;
            border-radius: 40px;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: 'Quicksand', sans-serif;
        }
        .tab-btn i { font-size: 15px; opacity: 0.7; }
        .tab-btn.active {
            background: #ffffffd9;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02), 0 0 0 1px #eaefec;
            color: #2c3631;
            font-weight: 600;
        }
        .tab-btn.active i { opacity: 1; color: #7fb397; }
        
        .sheet { display: none; animation: fade 0.25s ease; }
        .sheet.active { display: block; }
        @keyframes fade { 0% { opacity: 0.4; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
        
        .card {
            background: #ffffff;
            border-radius: 32px;
            padding: 18px 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.02), 0 0 0 1px #eaefec;
        }

        /* 浏览页样式 */
        .cat-block-wrapper {
            background: #eef3ef;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #eaefec;
        }
        .cat-block-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3631;
            padding: 4px 6px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }
        .cat-block-title i.toggle-icon { font-size: 13px; color: #7fb397; transition: transform 0.2s; }
        .cat-inner-content { display: none; }
        .cat-overview-box {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #55635a;
            border-left: 4px solid #7fb397;
            white-space: pre-wrap;
        }
        
        .accordion-item {
            background: #ffffff;
            border-radius: 16px;
            margin-bottom: 8px;
            border: 1px solid #eaefec;
            overflow: hidden;
        }
        .accordion-item:last-child { margin-bottom: 0; }
        .accordion-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            color: #2c3631;
        }
        .accordion-header i { color: #7fb397; width: 18px; font-size: 15px; }
        .accordion-header .tag {
            background: #fcedef;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 11px;
            color: #55635a;
            margin-left: auto;
        }
        .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; padding: 0 14px; background: #ffffff; }
        .accordion-body.open { max-height: 2500px; padding: 14px; border-top: 1px dashed #eaefec; }
        .accordion-body div { font-size: 13.5px; line-height: 1.7; color: #55635a; font-weight: 300; }
        .accordion-body strong { font-weight: 600; color: #2c3631; }
        .accordion-body .sep { border-top: 1px dashed #eaefec; margin: 12px 0; }
        .accordion-body .field-label { font-weight: 600; display: block; margin-top: 10px; font-size: 13px; color: #7fb397; }
        .accordion-body .field-label:first-of-type { margin-top: 0; }
        .accordion-body .field-content { padding-left: 2px; margin-bottom: 6px; font-size: 13.5px; white-space: pre-wrap; }
        
        /* 抽卡页样式 */
        .card-face {
            background: #ffffff;
            border-radius: 40px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02), 0 0 0 1px #eaefec;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            cursor: pointer;
        }
        .card-face .front { font-size: 24px; font-weight: 400; letter-spacing: 4px; color: #2c3631; }
        .card-face .back { font-size: 14px; font-weight: 300; color: #2c3631; line-height: 1.7; width: 100%; text-align: left; }
        
        .draw-btn {
            margin-top: 20px;
            background: #fcedef;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 500;
            color: #2c3631;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            cursor: pointer;
            transition: 0.15s;
            font-family: 'Quicksand', sans-serif;
            letter-spacing: 1px;
        }
        .draw-btn:active { background: #e8b7bf; transform: scale(0.97); }
        
        /* 选择页样式 */
        .structure-list { max-height: 200px; overflow-y: auto; padding-right: 2px; margin-bottom: 12px; }
        .structure-list::-webkit-scrollbar { width: 4px; }
        .structure-list::-webkit-scrollbar-thumb { background: #a6cba5; border-radius: 8px; }
        .structure-item {
            background: #ffffff;
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid #eaefec;
            transition: 0.1s;
            cursor: pointer;
            margin-bottom: 6px;
        }
        .structure-item:active, .structure-item.active { background: #eef3ef; border-color: #7fb397; }
        .structure-item i { width: 22px; color: #7fb397; font-size: 16px; }
        .structure-item span { font-weight: 500; font-size: 14.5px; color: #2c3631; }
        .structure-item .badge { margin-left: auto; background: #fcedef; padding: 2px 12px; border-radius: 40px; font-size: 11px; color: #55635a; }
        
        .selected-content {
            margin-top: 10px;
            background: #ffffff;
            border-radius: 24px;
            padding: 18px 16px;
            border-left: 4px solid #f0c2c9;
            border: 1px solid #eaefec;
        }
        .selected-content h4 { font-weight: 500; color: #2c3631; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; font-size: 16px; }
        .selected-content p { font-weight: 300; line-height: 1.7; color: #55635a; font-size: 14px; white-space: pre-wrap; }
        
        .img-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; width: 100%; }
        .img-group img { width: 45%; max-height: 110px; border-radius: 12px; cursor: pointer; object-fit: contain; background: #fff; border: 1px solid #eaefec; padding: 2px; }
        
        /* 进度页样式 */
        .progress-stats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
        .stat-box { background: #eef3ef; border-radius: 60px; padding: 6px 18px; font-size: 14px; display: flex; align-items: center; gap: 8px; border: 1px solid #eaefec; flex: 1; justify-content: center; }
        .stat-box i { color: #7fb397; }
        .progress-list { max-height: 380px; overflow-y: auto; }
        .progress-list::-webkit-scrollbar { width: 4px; }
        .progress-list::-webkit-scrollbar-thumb { background: #a6cba5; border-radius: 8px; }
        .progress-item { padding: 10px 4px; border-bottom: 1px solid #eaefec; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .progress-item:active { background: #ffffff; }
        .progress-item .p-name { flex: 1; font-weight: 400; font-size: 14.5px; color: #2c3631; }
        .progress-item .p-count { background: #fcedef; padding: 1px 14px; border-radius: 40px; font-size: 12px; font-family: 'Quicksand', sans-serif; }
        
        /* 微习惯页样式 */
        .habit-card { background: #eef3ef; border-radius: 24px; padding: 14px 18px; margin-bottom: 12px; border: 1px solid #eaefec; display: flex; align-items: center; gap: 14px; }
        .habit-card i { font-size: 20px; color: #7fb397; width: 24px; text-align: center; }
        .habit-card .habit-text { flex: 1; font-weight: 400; font-size: 14px; color: #2c3631; line-height: 1.5; }
        /* 微习惯圆圈单独处理，使用特殊字号和颜色确保不被挤扁 */
        .habit-check { font-size: 22px; cursor: pointer; display: flex; align-items: center; color: #a6cba5; font-style: normal; }
        
        .habit-add { display: flex; gap: 8px; margin-top: 10px; }
        .habit-add input { flex: 1; padding: 10px 16px; border-radius: 60px; border: 1px solid #eaefec; background: #ffffff; font-family: 'Quicksand', sans-serif; font-size: 14px; color: #2c3631; }
        .habit-add input:focus { outline: none; border-color: #7fb397; }
        .habit-add button { background: #fcedef; border: none; border-radius: 60px; padding: 0 22px; font-weight: 500; color: #2c3631; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        
        /* 弹窗图片样式 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 20px;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 95%; max-height: 85%; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); object-fit: contain; background: #fff; }
        .lightbox .close-btn { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 32px; cursor: pointer; opacity: 0.6; background: none; border: none; font-family: Arial, sans-serif; }
        
        /* 新增：文本放大弹窗专用样式 */
        .text-lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 2001;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 20px;
        }
        .text-lightbox.active { display: flex; animation: fade 0.2s ease; }
        .text-lightbox-content {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 28px;
            padding: 30px 24px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .text-lightbox-content::-webkit-scrollbar { width: 4px; }
        .text-lightbox-content::-webkit-scrollbar-thumb { background: #a6cba5; border-radius: 8px; }

        .scroll-area { max-height: 480px; overflow-y: auto; padding-right: 4px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-track { background: #eaefec; border-radius: 8px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #a6cba5; border-radius: 8px; }
    </style>
</head>
<body>
<div class="app-container" id="app">
    
    <div class="brand">
        <i style="font-style: normal; font-size:24px;">🪷</i>
        <h1>三十七道品</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="sheet1"><i style="font-style: normal;">☀️</i> 课程讲义</button>
        <button class="tab-btn" data-tab="sheet2"><i style="font-style: normal;">🍀</i> 随缘抽功课</button>
        <button class="tab-btn" data-tab="sheet3"><i style="font-style: normal;">🪷</i> 自选练习</button>
        <button class="tab-btn" data-tab="sheet4"><i style="font-style: normal;">🌊</i> 练习记录</button>
        <button class="tab-btn" data-tab="sheet5"><i style="font-style: normal;">✨</i> 微习惯</button>
    </div>

    <div id="sheet1" class="sheet active">
        <div style="text-align:center; font-size:14px; color:#94a39a; margin-bottom:12px; letter-spacing:1px; font-weight:500;">📖 逐一点击每个层级图标,可查阅讲义资料，如有疏漏悉皆忏悔，请告知更改🙏</div>
        <div class="card scroll-area" id="browseContainer"></div>
    </div>

    <div id="sheet2" class="sheet">
        <div style="text-align:center; font-size:14px; color:#94a39a; margin-bottom:12px; letter-spacing:1px; font-weight:500;">🍀 今天与您相遇的是……</div>
        <div class="card">
            <div class="card-face" id="cardFace">
                <div class="front" id="cardFront"><i style="font-style: normal; opacity:0.8;">✨</i> 点击抽卡</div>
                <div class="back" id="cardBack" style="display:none;"></div>
            </div>
            <button class="draw-btn" id="drawCardBtn"><i style="font-style: normal;">🍀</i> 随缘抽卡</button>
        </div>
        <div style="margin-top:12px; font-size:13px; color:#94a39a; text-align:center;"><i style="font-style: normal;">🌙</i> 点击卡片翻转 · 点击图片或右上角放大</div>
    </div>

    <div id="sheet3" class="sheet">
        <div class="card">
            <!-- 列表区在上方 (保留了一定的滚动高度) -->
            <div class="structure-list" id="structureList" style="max-height: 240px; margin-bottom: 16px;"></div>
            <!-- 展示区在下方 -->
            <div class="selected-content" id="selectedContent" style="margin-top: 0;">
                <h4><i style="font-style: normal;">🎐</i> 自取所需</h4>
                <p style="color:#94a39a;">点击上方细分标题，可查看对应实修功课卡，下翻可浏览全部</p>
            </div>
        </div>
    </div>

    <div id="sheet4" class="sheet">
        <div class="card">
            <div class="progress-stats">
                <div class="stat-box"><i style="font-style: normal;">☀️</i> 已练习 <span id="practicedCount">0</span></div>
                <div class="stat-box"><i style="font-style: normal;">💧</i> 未练习 <span id="missingCount">0</span></div>
            </div>
            <div class="progress-list" id="progressList"></div>
        </div>
    </div>

    <div id="sheet5" class="sheet">
        <div class="card">
            <div id="habitList"></div>
            <div class="habit-add">
                <input type="text" id="habitInput" placeholder="添加自定义微习惯…">
                <button id="addHabitBtn"><i style="font-style: normal;">➕</i></button>
            </div>
            <div style="margin-top:14px; font-size:13px; color:#94a39a; text-align:center;"><i style="font-style: normal;"></i> 每日微小，渐成觉知</div>
        </div>
    </div>
    
    
    <div class="teacher-verse" id="teacherVerse">
        <i style="font-style: normal; font-size:16px;">🎐</i>
        <span id="verseText">药方背的越熟，临场就越知道要用什么</span>
    </div>

</div>

<div class="text-lightbox" id="textLightbox" onclick="closeTextLightbox()">
    <div class="text-lightbox-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeTextLightbox()" style="position: absolute; top: 12px; right: 18px; font-size: 28px; background: none; border: none; color: #94a39a; cursor: pointer;">&times;</button>
        <div id="textLightboxBody"></div>
        <button onclick="closeTextLightbox();" style="width:100%; margin-top:20px; padding:12px; border-radius:60px; background:#eef3ef; border:1px solid #7fb397; color:#2c3631; font-weight:500; font-family:'Quicksand', sans-serif; cursor:pointer;">✅ 阅毕 · 随喜赞叹</button>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="close-btn" onclick="closeLightbox()">&times;</button>
    <img id="lightboxImg" src="" alt="放大查看">
</div>

<script>
// ================= 全局暴露函数 (修复图片/文本放大功能点击失效的问题) =================
window.closeLightbox = function() { document.getElementById('lightbox').classList.remove('active'); };
window.openLightbox = function(src) {
    if (!src) return;
    let cleanSrc = src;
    if (!cleanSrc.includes('.')) cleanSrc = cleanSrc + '.png'; 
    document.getElementById('lightboxImg').src = cleanSrc;
    document.getElementById('lightbox').classList.add('active');
};
window.closeTextLightbox = function() { document.getElementById('textLightbox').classList.remove('active'); };
window.openCardLightbox = function() {
    if(!window.currentCard) return;
    const textBody = document.getElementById('textLightboxBody');
    // 在弹窗中再次调用渲染，让所有内容完整显示
    textBody.innerHTML = `
        <h3 style="color:#2c3631; margin-bottom:14px; border-bottom:1px solid #eaefec; padding-bottom:10px; font-weight: 500; display:flex; align-items:center;">
            <i style="font-style: normal; margin-right:8px;">${window.currentCard.icon}</i>${window.currentCard.id}
        </h3>
        <div style="font-size:15px; line-height:1.8; color:#55635a; margin-bottom: 16px;">${renderTextHelper(window.currentCard.cardContent || '')}</div>
        ${compileImageGroupHelper(window.currentCard)}
    `;
    document.getElementById('textLightbox').classList.add('active');
};

// 辅助渲染函数（供全局调用）
function renderTextHelper(text) {
    if (!text) return '';
    let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/----/g, '<div class="sep" style="border-top:1px dashed #eaefec; margin:12px 0;"></div>');
    return html.replace(/\n/g, '<br>');
}
function compileImageGroupHelper(d) {
    const rawImages = [d.img1, d.img2, d.img3, d.img4].filter(Boolean);
    if (rawImages.length === 0) return '';
    let html = '<div class="img-group" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; width:100%;">';
    rawImages.forEach(img => {
        let fullPath = img.startsWith('images/') ? img : `images/${img}`;
        html += `<img src="${fullPath}" alt="${d.id}" loading="lazy" onclick="event.stopPropagation();window.openLightbox('${fullPath}')" style="width:45%; max-height:110px; border-radius:12px; cursor:pointer; object-fit:contain; background:#fff; border:1px solid #eaefec; padding:2px;">`;
    });
    return html + '</div>';
}

(function(){
    // ========================================== 一、底层核心大分类配置数据 ==========================================

    function triggerPracticeCount(itemId) {
        const matched = dharmaData.find(d => d.id === itemId);
        if (matched && (matched.category === '七觉支' || matched.category === '八正道')) return;

        const now = Date.now();
        if (clickTimestamps[itemId] && (now - clickTimestamps[itemId] < 1500)) return;
        clickTimestamps[itemId] = now;
        progress[itemId] = (progress[itemId] || 0) + 1;
        saveToStorage();
        updateProgressUI();
        refreshLiveBadges();
    }

    function refreshLiveBadges() {
        dharmaData.forEach(d => {
            const count = progress[d.id] || 0;
            const bBrowse = document.getElementById(`badge-browse-${d.id}`);
            if (bBrowse) bBrowse.textContent = `已练 ${count} 次`;
            const bSelect = document.getElementById(`badge-select-${d.id}`);
            if (bSelect) bSelect.textContent = `已练习 ${count} 次`;
            const bStructure = document.getElementById(`badge-struct-${d.id}`);
            if (bStructure) bStructure.textContent = `${d.tag} (${count}次)`;
        });
    }

            const ov = categoryOverview[cat];
            
            html += `<div class="cat-block-wrapper">
                <div class="cat-block-title" onclick="const t = document.getElementById('cat-child-${cat}'); const isO = t.style.display==='block'; t.style.display=isO?'none':'block'; this.querySelector('.toggle-icon').style.transform=isO?'rotate(0deg)':'rotate(180deg)';">

                    <i class="toggle-icon" style="font-style: normal;">▼</i>

            if (ov && ((ov.concept && ov.concept.trim()!=='') || (ov.sanskrit && ov.sanskrit.trim()!==''))) {
                let combinedText = '';
                if(ov.concept) combinedText += ov.concept;
                if(ov.sanskrit) combinedText += (ov.concept && !ov.concept.endsWith('----') ? '----' : '') + ov.sanskrit;
                html += `<div class="cat-overview-box">${renderTextHelper(combinedText)}</div>`;
            }

            items.forEach(d => {
                const count = progress[d.id] || 0;
                const isUnreleased = (cat === '七觉支' || cat === '八正道');
                const badgeHtml = isUnreleased ? '' : `<span class="tag" id="badge-browse-${d.id}">已练 ${count} 次</span>`;

                html += `<div class="accordion-item">
                    <div class="accordion-header" data-target="${d.id}">
                        <i style="font-style: normal;">${d.icon}</i>
                        <span>${d.id}</span>
                        ${badgeHtml}
                    </div>
                    <div class="accordion-body" id="body-${d.id}">`;
                
                if (isUnreleased) {
                    html += `<div style="color:#a08472; text-align:center; padding:6px 0;"><i style="font-style: normal;">🌲</i> 待新增，稍等哦…</div>`;
                } else {

                if(!isOpen) triggerPracticeCount(targetId);

        });

            const isUnreleased = (d.category === '七觉支' || d.category === '八正道');
            
            if (!isUnreleased) {
                if (count > 0) practiced++; else missing++;
            }
            
            const icon = count > 0 ? '☀️' : '💧';
            const disableStyle = isUnreleased ? 'opacity:0.5; cursor:default;' : '';
            const displayCount = isUnreleased ? '待更新' : `${count} 次`;
            
            html += `<div class="progress-item" data-id="${d.id}" style="${disableStyle}">
                <i style="font-style: normal;">${icon}</i>
                <span class="p-name">${d.id} <small style="color:#94a39a; font-size:11px; margin-left:4px;">(${d.tag})</small></span>
                <span class="p-count">${displayCount}</span>
            </div>`;
        });
        
        progressList.innerHTML = html;
        practicedCount.textContent = practiced;
        missingCount.textContent = missing;
        
        document.querySelectorAll('.progress-item').forEach(el => {
            el.addEventListener('click', function() {
                const id = this.dataset.id;
                triggerPracticeCount(id);
            });
        });
    }

    // ------ Sheet5: 微习惯页 ------
    function renderHabits() {
        habitList.innerHTML = '';
        habits.forEach((h, idx) => {
            const div = document.createElement('div');
            div.className = 'habit-card';
            div.innerHTML = `
                <span class="habit-text">${h}</span>
                <span class="habit-check" data-index="${idx}">⚪</span>
            `;
            habitList.appendChild(div);
        });
        
        document.querySelectorAll('.habit-check').forEach(el => {
            el.addEventListener('click', function() {
                if (this.textContent === '⚪') {
                    this.textContent = '🟢';
                    this.parentElement.style.opacity = '0.6';
                } else {
                    this.textContent = '⚪';
                    this.parentElement.style.opacity = '1';
                }
            });
        });
    }
    
    addHabitBtn.addEventListener('click', function() {
        const val = habitInput.value.trim();
        if (val) { 
            habits.push(val); 
            saveToStorage();
            renderHabits(); 
            habitInput.value = ''; 
        }
    });
    habitInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') addHabitBtn.click(); });

    const verses = [
        '药方背的越熟，临场就越知道要用什么',
        '这三十七项练习构成了一个完整的解构闭环——从最初的客观数据观测到行为生态的100%落地'
    ];
    
    function rotateVerse() {
        document.getElementById('verseText').textContent = verses[Math.floor(Math.random() * verses.length)];
    }
    document.getElementById('teacherVerse').addEventListener('click', rotateVerse);

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const target = this.dataset.tab;
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
            document.getElementById(target).classList.add('active');
            rotateVerse();
        });
    });

    // ========================================== 六、初始化全盘加载运行 ==========================================
    renderBrowse();
    renderStructureList();
    updateProgressUI();
    renderHabits();
    drawCard();
    rotateVerse();
    console.log('三十七道品 · 禅意重构版加载完成。');
})();
</script>
</body>
</html>
